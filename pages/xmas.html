---
layout: default
title: yearly xmas prose
permalink: /xmas/
---

<ul class="post-list">
  {% assign xmas_posts = site.xmas | sort: 'date' | reverse %}
  {% for post in xmas_posts %}
  <li>
    <h2 class="post-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    <p class="post-meta">{{ post.date | date: "%B %-d, %Y" }}</p>
  </li>
  {% endfor %}
</ul>

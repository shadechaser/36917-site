---
layout: default
title: search
permalink: /search/
---

<div id="cloud-container" style="min-height: 80px; display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.5rem 0.9rem; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 0.5px solid #e4e2dc;">
  <p id="cloud-loading" style="font-family: 'DM Mono', monospace; font-size: 0.65rem; color: #ccc; letter-spacing: 0.08em;">building cloud…</p>
</div>

<div style="margin-bottom: 2rem;">
  <input type="text" id="search-input" placeholder="type to search..." autocomplete="off" style="width: 100%; border: none; border-bottom: 0.5px solid #e4e2dc; background: transparent; padding: 0.4rem 0; font-family: inherit; font-size: 1rem; color: #2a2a28; outline: none;">
</div>

<p id="search-count" style="font-family: 'DM Mono', monospace; font-size: 0.6rem; color: #aaa; letter-spacing: 0.06em; margin-bottom: 1.5rem; display: none;"></p>
<div id="search-results"></div>
<p id="search-empty" style="font-family: 'DM Mono', monospace; font-size: 0.65rem; color: #aaa; letter-spacing: 0.06em; display: none;">no results</p>

<style>
  .cloud-word {
    cursor: pointer;
    color: #2a2a28;
    line-height: 1.4;
    font-family: 'EB Garamond', Georgia, serif;
    transition: color 0.15s;
  }
  .cloud-word:hover { color: #7a2832; }
  .search-result { padding: 1.4rem 0; border-bottom: 0.5px solid #e4e2dc; }
  .search-result:first-child { border-top: 0.5px solid #e4e2dc; }
  .search-result-title { font-size: 1rem; margin-bottom: 0.25rem; }
  .search-result-title a { color: #2a2a28; text-decoration: none; }
  .search-result-title a:hover { color: #666662; }
  .search-result-meta { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: #aaa; letter-spacing: 0.06em; margin-bottom: 0.6rem; }
  .search-result-snippet { font-size: 0.9rem; line-height: 1.7; color: #555; max-width: 58ch; }
  .search-highlight { background: #f5f0d8; padding: 0 2px; border-radius: 2px; }
</style>

<script>
var STOPWORDS = new Set([
  'the','and','a','an','to','of','in','is','it','that','was','for','on','are',
  'with','as','at','be','by','from','or','but','not','this','have','had','he',
  'she','they','we','you','i','my','his','her','their','our','its','if','so',
  'do','did','what','when','which','who','will','would','could','should','been',
  'has','were','one','all','there','about','more','out','up','no','can','just',
  'me','him','them','your','into','than','then','some','like','know','get','got',
  'also','time','way','even','back','because','very','much','only','well','still',
  'over','after','before','through','down','now','here','how','any','two','where',
  'while','these','those','new','first','last','long','little','own','other',
  'old','right','too','made','say','make','go','come','see','think','look','years',
  've','re','ll','don','didn','isn','wasn','won','let','us','every','thing',
  'things','something','nothing','everything','never','always','again','around',
  'without','though','off','take','came','went','day','days','man','men','woman',
  'people','world','life','feel','felt','want','wanted','need','needed','found',
  'place','ways','year','told','said','keep','kept','left','next','seems','seem',
  'seemed','maybe','might','must','used','once','put','three','four','five','many',
  'may','does','am','each','between','most','since','until','across','both','few',
  'yet','either','another','same','different','called','ask','asked','hand','hands',
  'point','small','large','big','away','along','least','still','upon','whose','whom'
]);

var posts;

fetch('/search.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    posts = data;
    buildCloud(data);
    var input = document.getElementById('search-input');
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q');
    if (q) { input.value = q; doSearch(q); }
    input.focus();
    input.addEventListener('input', function() { doSearch(this.value.trim()); });
  });

function buildCloud(data) {
  var freq = {};
  data.forEach(function(post) {
    var text = ((post.title || '') + ' ' + (post.content || '')).toLowerCase();
    var words = text.match(/[a-z']{3,}/g) || [];
    words.forEach(function(w) {
      w = w.replace(/^'+|'+$/g, '');
      if (w.length < 3 || STOPWORDS.has(w)) return;
      freq[w] = (freq[w] || 0) + 1;
    });
  });

  var sorted = Object.entries(freq)
    .filter(function(e) { return e[1] >= 3; })
    .sort(function(a, b) { return b[1] - a[1]; })
    .slice(0, 100);

  var max = sorted[0][1];
  var min = sorted[sorted.length - 1][1];

  for (var i = sorted.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = sorted[i]; sorted[i] = sorted[j]; sorted[j] = tmp;
  }

  var container = document.getElementById('cloud-container');
  document.getElementById('cloud-loading').remove();

  sorted.forEach(function(entry) {
    var word = entry[0], count = entry[1];
    var scale = (count - min) / (max - min);
    var size = 0.75 + scale * 2.0;
    var opacity = 0.35 + scale * 0.65;
    var span = document.createElement('span');
    span.className = 'cloud-word';
    span.textContent = word;
    span.style.fontSize = size + 'rem';
    span.style.opacity = opacity;
    span.title = count + ' occurrences';
    span.addEventListener('click', function() {
      var input = document.getElementById('search-input');
      input.value = word;
      doSearch(word);
      input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    container.appendChild(span);
  });
}

function highlight(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark class="search-highlight">$1</mark>');
}

function getSnippet(content, query, length) {
  length = length || 200;
  if (!content) return '';
  var lower = content.toLowerCase();
  var i = lower.indexOf(query.toLowerCase());
  var start = i === -1 ? 0 : Math.max(0, i - 80);
  var snippet = content.slice(start, start + length);
  if (start > 0) snippet = '…' + snippet;
  if (start + length < content.length) snippet += '…';
  return snippet;
}

function doSearch(query) {
  var container = document.getElementById('search-results');
  var empty = document.getElementById('search-empty');
  var count = document.getElementById('search-count');
  container.innerHTML = '';
  count.style.display = 'none';

  if (!query || query.length < 2) {
    empty.style.display = 'none';
    return;
  }

  var lower = query.toLowerCase();
  var matches = posts.filter(function(p) {
    return (p.title && p.title.toLowerCase().indexOf(lower) !== -1) ||
           (p.content && p.content.toLowerCase().indexOf(lower) !== -1);
  });

  if (matches.length === 0) {
    empty.style.display = 'block';
    count.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  count.style.display = 'block';
  count.textContent = matches.length + (matches.length === 1 ? ' match' : ' matches');

  matches.sort(function(a, b) {
    var aTitle = a.title && a.title.toLowerCase().indexOf(lower) !== -1 ? 1 : 0;
    var bTitle = b.title && b.title.toLowerCase().indexOf(lower) !== -1 ? 1 : 0;
    if (bTitle !== aTitle) return bTitle - aTitle;
    return new Date(b.date) - new Date(a.date);
  });

  matches.forEach(function(post) {
    var snippet = getSnippet(post.content, query);
    var div = document.createElement('div');
    div.className = 'search-result';
    div.innerHTML =
      '<div class="search-result-title"><a href="' + post.url + '">' + highlight(post.title, query) + '</a></div>' +
      '<div class="search-result-meta">' + post.date + ' &nbsp;·&nbsp; ' + post.category + '</div>' +
      '<div class="search-result-snippet">' + highlight(snippet, query) + '</div>';
    container.appendChild(div);
  });
}
</script>

---
layout: default
---

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
    </p>
  </header>

  <div class="post-content{% if page.style == 'verse' %} verse{% endif %}">
    {{ content }}
  </div>

  <nav class="post-nav">
    {% if page.previous %}
      <a class="prev" href="{{ page.previous.url | relative_url }}">← {{ page.previous.title }}</a>
    {% else %}
      <span></span>
    {% endif %}
    {% if page.next %}
      <a class="next" href="{{ page.next.url | relative_url }}">{{ page.next.title }} →</a>
    {% endif %}
  </nav>
</article>

{% if page.style == 'verse' %}
<script>
  // Wrap each intentional line (separated by <br>) in its own
  // block so the hanging-indent CSS only triggers on lines the
  // browser is forced to wrap, not on lines the poet chose.
  document.querySelectorAll('.post-content.verse p').forEach(function (p) {
    var parts = p.innerHTML.split(/<br\s*\/?>/i);
    p.innerHTML = parts.map(function (t) {
      return '<span class="vline">' + t + '</span>';
    }).join('');
  });
</script>
{% endif %}
